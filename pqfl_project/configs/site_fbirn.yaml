# Access: RESTRICTED - Contact PI directly
# Contact: Dr. Theo G.M. van Erp (tvanerp@hs.uci.edu)
# Must facilitate interaction with IRB + sign DUA
# NOTE: Phase II has NO resting-state fMRI (task-based only)
# NOTE: Phase III has rest fMRI: 176 SZ + 186 HC
site:
  name: "FBIRN"
  id: 1
  data_path: "${data.base_path}/FBIRN"
  access: "dua"                  # Requires direct PI contact
  source_contact: "tvanerp@hs.uci.edu"

