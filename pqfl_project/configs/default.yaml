# PQFL Default Configuration
# Distributed Brain Connectivity Analysis for Schizophrenia

defaults:
  - _self_

# Random seed for reproducibility
seed: 42

# Parcellation settings
parcellation:
  atlas: "schaefer"  # schaefer, aal
  n_rois: 100       # 100, 200, 400
  yeo_networks: 7

# Riemannian geometry settings
riemannian:
  metric: "affine_invariant"  # affine_invariant, log_euclidean
  regularization_lambda: 1.0e-3
  frechet_max_iter: 20
  frechet_tol: 1.0e-6

# Tangent space reduction
reduction:
  method: "pca"  # pca, learnable
  n_components: 256
  encoder_hidden_dims: [512, 256]
  encoder_activation: "gelu"
  encoder_output_activation: "tanh"

# Quantum circuit settings
quantum:
  n_qubits: 12
  encoding: "angle"  # angle, amplitude
  ansatz: "strongly_entangling"  # strongly_entangling, basic_entangler, custom_rqfm
  n_base_layers: 3       # Shared across sites (federated)
  n_personal_layers: 1   # Local per site (not federated)
  circuit_depth_limit: 5
  shots: null  # null = state vector simulation

# Model architecture
model:
  classical_encoder_dims: [150, 128]  # Before quantum layer
  fdt_features: 20                    # Frequency-dependent topology features
  classifier_hidden_dims: [64]
  dropout: 0.3
  use_dual_register: true

# Federated learning settings
federated:
  n_rounds: 50
  n_local_epochs: 5
  fraction_fit: 1.0
  strategy: "fedper"  # fedavg, fedper, fedprox
  fedprox_mu: 0.01
  min_fit_clients: 3
  min_available_clients: 3

# Privacy settings
privacy:
  enabled: false
  epsilon: 4.0
  delta: 1.0e-5
  max_grad_norm: 1.0
  noise_multiplier: 1.1

# Training settings
training:
  optimizer: "adamw"
  learning_rate: 0.001
  weight_decay: 0.01
  scheduler: "cosine_annealing"
  batch_size: 32
  gradient_clip: 1.0

# Harmonization
harmonization:
  method: "combat"  # combat, covbat, none
  biological_covariates: ["diagnosis", "age", "sex"]

# Evaluation settings
evaluation:
  primary_metric: "balanced_accuracy"
  metrics: ["balanced_accuracy", "auc_roc", "f1", "sensitivity", "specificity"]
  confidence_level: 0.95
  n_bootstrap: 1000

# Experiment tracking
tracking:
  enabled: true
  backend: "mlflow"
  experiment_name: "pqfl_schizophrenia"

# Logging
logging:
  level: "INFO"
  save_dir: "./results"
